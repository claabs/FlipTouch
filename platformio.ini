[env:adafruit_feather_esp32s3]
platform = espressif32
board = adafruit_feather_esp32s3
framework = arduino
lib_deps = 
	adafruit/Adafruit MAX1704x@^1.0.3
	lemmingdev/ESP32-BLE-Gamepad@^0.7.4
monitor_speed = 115200
